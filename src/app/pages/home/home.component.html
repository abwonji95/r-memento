<mat-toolbar color="primary">

  <button mat-button routerLink="/home">
  <mat-icon>home</mat-icon>
      </button>

  <!-- This fills the remaining space of the current row -->
  <span class="fill-remaining-space"></span>
  <div fxLayout="row" fxShow="false" fxShow.gt-sm>
      <button mat-button routerLink="/countries">Countries</button>
      <button mat-button routerLink="/holiday-today">Holiday Today</button>
  </div>
  <button mat-button [mat-menu-trigger-for]="menu" fxHide="false" fxHide.gt-sm>
   <mat-icon>menu</mat-icon>
  </button>

</mat-toolbar>
<mat-menu x-position="before" #menu="matMenu">
  <button mat-menu-item routerLink="/countries">Countries</button>
  <button mat-menu-item routerLink="/holiday-today">Holiday Today</button>
  <!--<button mat-menu-item>Help</button>-->
</mat-menu>
